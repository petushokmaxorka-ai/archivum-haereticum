<!-- Title -->
<text x="500" y="780" text-anchor="middle" fill="#c9a227" font-family="serif" font-size="16" font-weight="bold">VANAGA RONGORONGO · 12 ГЛИФОВ С ПОСОХА САНТЬЯГО</text>
<text x="500" y="800" text-anchor="middle" fill="#9e8855" font-family="serif" font-size="11" font-style="italic">Rapa Nui · Ostatkowski 1886 · нерасшифровано · ~1400 н.э.</text>

<!-- Description block -->
<g transform="translate(50, 830)">
<rect width="900" height="620" fill="#0d0d12" stroke="#8a7119" stroke-width="1" opacity="0.85"/>
<text x="20" y="30" fill="#c9a227" font-family="serif" font-size="14" font-weight="bold">ℹ О Rongorongo</text>
<text x="20" y="60" fill="#d4c6a8" font-family="serif" font-size="12">• Единственная ПИСЬМЕННОСТЬ Океании до европейского контакта (1400-1500 н.э.)</text>
<text x="20" y="85" fill="#d4c6a8" font-family="serif" font-size="12">• ~200 глифов: антропоморфные, зооморфные, геометрические, составные</text>
<text x="20" y="110" fill="#d4c6a8" font-family="serif" font-size="12">• Сохранилось 25 табличек (14 уцелевших) — Santiago Staff, Berlin, Paris, Large Santiago</text>
<text x="20" y="135" fill="#d4c6a8" font-family="serif" font-size="12">• НЕРАСШИФРОВАНО с момента обнаружения миссионером Эйро (Eyrouts) в 1864 г.</text>
<text x="20" y="160" fill="#d4c6a8" font-family="serif" font-size="12">• Записано BOUSTROPHEDON (чередование направления строк)</text>
<text x="20" y="185" fill="#c8102e" font-family="serif" font-size="12" font-weight="bold">• Каждый квадрат = 1 глиф · чтение невозможно · но визуально они СУЩЕСТВУЮТ</text>
<text x="20" y="220" fill="#c9a227" font-family="serif" font-size="14" font-weight="bold">📜 ТЕКСТЫ (устная традиция Рапа-Нуи)</text>
<text x="20" y="250" fill="#d4c6a8" font-family="serif" font-size="11">Хотя Rongorongo не расшифрован, СВЯЩЕННЫЕ УСТНЫЕ ТЕКСТЫ дошли до нас в записи:</text>
<text x="20" y="275" fill="#9e8855" font-family="serif" font-size="11">• <tspan font-weight="bold">Atua Mata Rapa Nui</tspan> (мифы о сотворении, записаны Routledge 1914)</text>
<text x="20" y="295" fill="#9e8855" font-family="serif" font-size="11">• <tspan font-weight="bold">Tangata Manu</tspan> (обряд Человека-Птицы, записан Routledge/Metraux)</text>
<text x="20" y="315" fill="#9e8855" font-family="serif" font-size="11">• <tspan font-weight="bold">Make-Make</tspan> (верховный бог-создатель)</text>
<text x="20" y="335" fill="#9e8855" font-family="serif" font-size="11">• <tspan font-weight="bold">Hine-pahu</tspan> (богиня смерти)</text>
<text x="20" y="365" fill="#c9a227" font-family="serif" font-size="13" font-weight="bold">🌺 ПРИМОРДИАЛЬНАЯ СВЯЗЬ</text>
<text x="20" y="390" fill="#d4c6a8" font-family="serif" font-size="11">Глиф «фрегат» (Manu Tara) = священная птица Rapa Nui = символ Tangaroa (Q37 Самоа)</text>
<text x="20" y="410" fill="#d4c6a8" font-family="serif" font-size="11">Глиф «солнце» (Ra'a) = Tama-nui-te-rā (Q37 Гавайи) = Tōnatiuh (Q34 Ацтеки)</text>
<text x="20" y="430" fill="#d4c6a8" font-family="serif" font-size="11">Глиф «человек» (Tangata) = первая фигура в Kumulipo (Q37)</text>
<text x="20" y="450" fill="#d4c6a8" font-family="serif" font-size="11">Глиф «священный крюк» = Tangaroa's fish hook в Q37 Самоа/Гавайи</text>
<text x="20" y="470" fill="#d4c6a8" font-family="serif" font-size="11">Глиф «змея» = Wagyl (Q36 Австралия) = Tiamat (Q25) = Ahi (Q6) = Jörmungandr (Q22)</text>
<text x="20" y="490" fill="#d4c6a8" font-family="serif" font-size="11">Глиф «луна» (Mahina) = Mahina в Kumulipo (Q37) = Sin (Q17 Шумер)</text>
<text x="20" y="520" fill="#c9a227" font-family="serif" font-size="13" font-weight="bold">⚠ СОВРЕМЕННЫЕ ПОПЫТКИ РАСШИФРОВКИ</text>
<text x="20" y="545" fill="#d4c6a8" font-family="serif" font-size="11">• Thomas Barthel (1958) — «календарь лунных фаз» (отвергнуто)</text>
<text x="20" y="565" fill="#d4c6a8" font-family="serif" font-size="11">• Alfred Métraux (1940) — «священные песни, литургический календарь»</text>
<text x="20" y="585" fill="#d4c6a8" font-family="serif" font-size="11">• Yuri Knorozov (1957) — попытка дешифровки через полинезийские параллели</text>
<text x="20" y="605" fill="#c8102e" font-family="serif" font-size="11" font-weight="bold">• ПОКА НИ ОДНА ДЕШИФРОВКА НЕ ПРИЗНАНА АКАДЕМИЧЕСКИМ МИРОМ</text>
</g>
</svg>
