<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8">
<title>Глава 11. Шраддха-виддхи — Manu-smriti</title><style>
:root{--bg:#0a0908;--panel:#1a1410;--line:#2e2620;--gold:#d4af37;--gold-dim:#8a6f1a;--ink:#e8dfca;--ink-dim:#9a8f78;--sanskrit:#ff9933;--red:#8c2f26}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,serif;line-height:1.6}
header.top{border-bottom:2px solid var(--gold-dim);padding:18px 24px;background:var(--panel)}
header.top .brand{font-size:12px;letter-spacing:3px;color:var(--ink-dim);text-transform:uppercase}
header.top h1{margin:6px 0 2px;font-size:23px;color:var(--gold);font-weight:normal}
header.top .sub{color:var(--ink-dim);font-size:13px}
.stamp{display:inline-block;border:1px solid var(--gold-dim);color:var(--gold);font-size:11px;letter-spacing:2px;padding:2px 8px;margin-left:8px;vertical-align:middle}
.stamp.fir{color:#ff9933;background:rgba(255,153,51,0.05);border-color:#ff9933}
nav.menu{padding:10px 24px;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink-dim);background:var(--panel);line-height:1.8}
nav.menu a{margin-right:8px;white-space:nowrap}
.cnt{padding:20px 24px;font-size:14.5px;line-height:1.7}
.verse{border-bottom:1px solid var(--line);padding:14px 0;display:grid;grid-template-columns:50px 1fr 1fr;gap:14px}
.verse .num{color:var(--gold);font-size:1.1rem;text-align:right;font-weight:bold;padding-top:8px}
.verse .sk{color:var(--sanskrit);font-size:15px;line-height:1.7;background:rgba(255,153,51,0.05);padding:8px 12px;border-left:2px solid var(--sanskrit);font-style:italic}
.verse .ru{color:var(--ink);font-size:14.5px;line-height:1.7;padding:8px 0}
.verse .ru.empty{color:var(--ink-dim);font-style:italic}
h2.ch{color:var(--gold);font-size:18px;letter-spacing:2px;margin:24px 0 14px;padding:8px 0;border-bottom:2px solid var(--gold-dim);font-weight:normal}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin:14px 0}
.idx-card{border:1px solid var(--line);background:var(--panel);padding:10px 14px;display:block}
.idx-card:hover{border-color:var(--gold-dim);text-decoration:none}
.idx-card .t{color:var(--gold);font-size:14px}
.idx-card .s{color:var(--ink-dim);font-size:11px;margin-top:4px}
.note{margin:14px 0;padding:12px 16px;border:1px solid var(--line);background:var(--panel);font-size:13px;color:var(--ink-dim)}
footer{padding:24px;color:var(--ink-dim);font-size:12px;border-top:1px solid var(--line);margin-top:20px}
@media(max-width:760px){.verse{grid-template-columns:30px 1fr}.verse .sk{border-left:none;border-top:2px solid var(--sanskrit)}}
</style></head><body>
