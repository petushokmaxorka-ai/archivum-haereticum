# АВТОСБОРКА САЙТА (Actions → Pages)
#
# ВНИМАНИЕ: токен агента не имеет workflow-scope, поэтому файл лежит здесь.
# ОДИН РУЧНОЙ ШАГ: перемести этот файл в .github/workflows/build.yml
# (открыть файл → карандаш → в имени пути вписать ../.github/workflows/build.yml).
# Затем: Settings → Pages → Source: "GitHub Actions".
# Сайт (Коран + Scriptorium) собирается сам при каждом пуше.

name: build-corpus
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch sources (Q1)
        run: bash corpus/tools/fetch_sources.sh
      - name: Build Quran
        run: python3 corpus/tools/build_quran.py --src quran_uthmani.txt --out .
      - name: Verify integrity
        run: python3 corpus/tools/verify.py quran_uthmani.txt 6236
      - name: Assemble Scriptorium
        run: mkdir -p site/scriptorium && cp scriptorium/index.html site/scriptorium/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
